title: Einführung in Shell
description: >-
  Die Unix-Befehlszeile hat sich seit fast 50 Jahren bewährt und ist immer
  beliebter geworden, weil man damit komplexe Aufgaben mit nur wenigen
  Tastenanschlägen erledigen kann. Manchmal wird es als „der universelle
  Klebstoff der Programmierung“ bezeichnet. Es hilft Leuten, vorhandene
  Programme auf neue Weise zu kombinieren, sich wiederholende Aufgaben zu
  automatisieren und Programme auf Clustern und Clouds auszuführen, die
  vielleicht am anderen Ende der Welt sind. Dieser Kurs zeigt dir die
  wichtigsten Sachen und wie du sie gut nutzen kannst.
programming_language: shell
from: shell-base-prod:v1.1.3
